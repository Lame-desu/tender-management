services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tender_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API (Express + Prisma) ──────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/tender_management"
      JWT_ACCESS_SECRET: "tender-access-secret-key-change-in-production"
      JWT_REFRESH_SECRET: "tender-refresh-secret-key-change-in-production"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: "5000"
      UPLOAD_DIR: "./uploads"
      MAX_FILE_SIZE: "10485760"
      CORS_ORIGIN: "http://localhost:3000"
      SMTP_USER: "lamedesu9@gmail.com"
      SMTP_APP_PASSWORD: "mhpt zuye usyf omjq"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ── Frontend (Next.js) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
